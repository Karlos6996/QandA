<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KarlosScript – Questions and Answers (Q&amp;A)</title>
  <meta name="description" content="Questions and Answers for Netflix! Find your issue and read instructions!" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0a;
      --red: #e50914;
      --red-dark: #b81d24;
      --glass: rgba(255, 255, 255, 0.04);
      --glass-border: rgba(255, 255, 255, 0.09);
      --text: #ffffff;
      --text-dim: #b3b3b3;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
      background:
        radial-gradient(60% 50% at 50% 0%, rgba(229, 9, 20, 0.28) 0%, rgba(229, 9, 20, 0) 60%),
        radial-gradient(40% 40% at 85% 20%, rgba(229, 9, 20, 0.16) 0%, rgba(229, 9, 20, 0) 55%),
        radial-gradient(45% 45% at 10% 80%, rgba(229, 9, 20, 0.12) 0%, rgba(229, 9, 20, 0) 60%),
        var(--bg);
      background-attachment: fixed;
      overflow-x: hidden;
    }
    body::before {
      content: "";
      position: fixed;
      inset: -20%;
      background: radial-gradient(35% 35% at 50% 50%, rgba(229, 9, 20, 0.10), transparent 70%);
      animation: float 14s ease-in-out infinite alternate;
      pointer-events: none;
      z-index: 0;
    }
    @keyframes float {
      0%   { transform: translate(-8%, -6%) scale(1); }
      100% { transform: translate(10%, 8%) scale(1.15); }
    }
    .wrap {
      position: relative;
      z-index: 1;
      max-width: 860px;
      margin: 0 auto;
      padding: 64px 20px 96px;
    }
    header { text-align: center; margin-bottom: 44px; }
    .logo-mark {
      display: inline-block;
      font-family: "Bebas Neue", sans-serif;
      font-size: 2.6rem;
      letter-spacing: 2px;
      color: var(--red);
      text-shadow: 0 0 26px rgba(229, 9, 20, 0.65);
      margin-bottom: 6px;
      animation: fadeDown .7s ease both;
    }
    header h1 {
      font-family: "Bebas Neue", sans-serif;
      font-size: clamp(3rem, 9vw, 5.4rem);
      line-height: 1;
      letter-spacing: 1px;
      background: linear-gradient(90deg, #ff2d3b, var(--red), #8c0610);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 6px 30px rgba(229, 9, 20, 0.45));
      animation: fadeDown .7s ease .05s both;
    }
    header p {
      color: var(--text-dim);
      font-size: 1.1rem;
      margin-top: 8px;
      animation: fadeDown .7s ease .12s both;
    }
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .search {
      position: relative;
      margin: 0 0 14px;
      animation: fadeUp .7s ease .18s both;
    }
    .search .ico {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1.1rem;
      opacity: .7;
      pointer-events: none;
    }
    .search input {
      width: 100%;
      padding: 16px 18px 16px 50px;
      font-size: 1rem;
      font-family: inherit;
      color: var(--text);
      background: var(--glass);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      border-radius: 14px;
      outline: none;
      transition: border-color .2s, box-shadow .2s, background .2s;
    }
    .search input:focus {
      border-color: var(--red);
      background: rgba(255, 255, 255, 0.06);
      box-shadow: 0 0 0 4px rgba(229, 9, 20, 0.18), 0 0 30px rgba(229, 9, 20, 0.25);
    }
    .search input::placeholder { color: var(--text-dim); }
    .count {
      text-align: right;
      font-size: .82rem;
      color: var(--text-dim);
      margin: 0 4px 22px;
      letter-spacing: .3px;
      animation: fadeUp .7s ease .22s both;
    }
    .count b { color: var(--red); }
    .qa-list { display: flex; flex-direction: column; gap: 14px; }
    .qa-item {
      background: var(--glass);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      overflow: hidden;
      transition: transform .2s, border-color .25s, box-shadow .25s, background .25s;
      animation: fadeUp .5s ease both;
    }
    .qa-item:hover {
      transform: translateY(-2px);
      border-color: rgba(229, 9, 20, 0.55);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.45);
    }
    .qa-item.open {
      border-color: var(--red);
      background: rgba(229, 9, 20, 0.06);
      box-shadow: 0 0 0 1px rgba(229, 9, 20, 0.4), 0 14px 50px rgba(229, 9, 20, 0.18);
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .qa-question {
      width: 100%;
      text-align: left;
      background: none;
      border: none;
      color: var(--text);
      font-size: 1.08rem;
      font-weight: 600;
      font-family: inherit;
      padding: 20px 22px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      transition: color .2s;
    }
    .qa-question:hover { color: var(--red); }
    .qa-question .icon {
      flex-shrink: 0;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: rgba(229, 9, 20, 0.15);
      color: var(--red);
      font-size: 1.3rem;
      line-height: 1;
      transition: transform .25s, background .25s;
    }
    .qa-item.open .qa-question .icon {
      transform: rotate(135deg);
      background: var(--red);
      color: #fff;
    }
    .qa-answer { max-height: 0; overflow: hidden; transition: max-height .3s ease; }
    .qa-answer-inner {
      padding: 0 22px 20px;
      color: var(--text-dim);
      border-top: 1px solid transparent;
    }
    .qa-item.open .qa-answer-inner {
      border-top-color: rgba(255, 255, 255, 0.08);
      padding-top: 16px;
    }
    .qa-answer-inner a { color: var(--red); text-decoration: none; border-bottom: 1px solid rgba(229, 9, 20, 0.4); }
    .qa-answer-inner a:hover { border-bottom-color: var(--red); }
    .qa-answer-inner code {
      background: rgba(255, 255, 255, 0.08);
      padding: 2px 7px;
      border-radius: 6px;
      font-size: .9em;
    }
    .empty {
      text-align: center;
      color: var(--text-dim);
      padding: 50px 20px;
      font-size: 1.05rem;
    }
    footer {
      text-align: center;
      margin-top: 60px;
      color: var(--text-dim);
      font-size: .9rem;
      animation: fadeUp .7s ease .3s both;
    }
    footer a { color: var(--red); text-decoration: none; }
    footer a:hover { text-decoration: underline; }
    footer code {
      background: rgba(255, 255, 255, 0.08);
      padding: 2px 7px;
      border-radius: 6px;
    }
    ::-webkit-scrollbar { width: 10px; }
    ::-webkit-scrollbar-track { background: #0a0a0a; }
    ::-webkit-scrollbar-thumb { background: var(--red-dark); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--red); }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="logo-mark">N</div>
      <h1>Netflix Q&amp;A</h1>
      <p>Click on the threads to see the answer!</p>
    </header>

    <div class="search">
      <span class="ico">🔍</span>
      <input id="search" type="text" placeholder="Search Bar" autocomplete="off" />
    </div>
    <div id="count" class="count"></div>

    <div id="qa-list" class="qa-list"></div>
    <div id="empty" class="empty" style="display:none;">I cant find anything! MSG ME ON ELDORADO</div>

    <footer>
      Site works on <a href="https://pages.github.com/" target="_blank" rel="noopener">GitHub Pages</a> ·
      Netflix <code>CDK key</code>
    </footer>
  </div>

  <script src="questions.js"></script>
  <script>
    (function () {
      var list = document.getElementById("qa-list");
      var empty = document.getElementById("empty");
      var search = document.getElementById("search");
      var count = document.getElementById("count");
      var data = (typeof QUESTIONS !== "undefined" && Array.isArray(QUESTIONS)) ? QUESTIONS : [];

      function render(filter) {
        list.innerHTML = "";
        filter = (filter || "").trim().toLowerCase();
        var shown = 0;

        data.forEach(function (item) {
          var q = (item.q || "");
          var a = (item.a || "");
          if (filter && (q + " " + a).toLowerCase().indexOf(filter) === -1) return;
          shown++;

          var wrap = document.createElement("div");
          wrap.className = "qa-item";
          wrap.style.animationDelay = (shown * 0.05) + "s";

          var btn = document.createElement("button");
          btn.className = "qa-question";
          btn.innerHTML = "<span>" + escapeHtml(q) + "</span><span class='icon'>+</span>";

          var ans = document.createElement("div");
          ans.className = "qa-answer";
          var inner = document.createElement("div");
          inner.className = "qa-answer-inner";
          inner.innerHTML = a;
          ans.appendChild(inner);

          btn.addEventListener("click", function () {
            var isOpen = wrap.classList.toggle("open");
            ans.style.maxHeight = isOpen ? (inner.scrollHeight + 32) + "px" : "0";
          });

          wrap.appendChild(btn);
          wrap.appendChild(ans);
          list.appendChild(wrap);
        });

        empty.style.display = shown === 0 ? "block" : "none";
        count.innerHTML = data.length
          ? "<b>" + shown + "</b> / " + data.length + " questions"
          : "";
      }

      function escapeHtml(s) {
        return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
      }

      search.addEventListener("input", function () { render(search.value); });
      render("");
    })();
  </script>
</body>
</html>
