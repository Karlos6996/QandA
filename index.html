<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KarlosScript – Questions and Answers (Q&amp;A)</title>
  <meta name="description" content="Questions and Answers for Netflix! Find your issue and read instructions!" />
  <style>
    :root {
      --bg: #141414;
      --bg-soft: #1f1f1f;
      --bg-card: #1c1c1c;
      --border: #333333;
      --text: #ffffff;
      --text-dim: #b3b3b3;
      --accent: #e50914;
      --accent-soft: rgba(229, 9, 20, 0.18);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    .wrap { max-width: 820px; margin: 0 auto; padding: 32px 20px 80px; }
    header { text-align: center; margin-bottom: 32px; }
    header h1 {
      font-size: 2.2rem;
      margin: 0 0 8px;
      background: linear-gradient(90deg, #e50914, #b81d24);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    header p { color: var(--text-dim); margin: 0; font-size: 1.05rem; }
    .search { position: relative; margin: 0 0 24px; }
    .search input {
      width: 100%;
      padding: 14px 16px;
      font-size: 1rem;
      color: var(--text);
      background: var(--bg-soft);
      border: 1px solid var(--border);
      border-radius: 12px;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    .search input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
    .search input::placeholder { color: var(--text-dim); }
    .qa-list { display: flex; flex-direction: column; gap: 12px; }
    .qa-item {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      transition: border-color .15s;
    }
    .qa-item.open { border-color: var(--accent); }
    .qa-question {
      width: 100%;
      text-align: left;
      background: none;
      border: none;
      color: var(--text);
      font-size: 1.05rem;
      font-weight: 600;
      padding: 18px 20px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      font-family: inherit;
    }
    .qa-question:hover { color: var(--accent); }
    .qa-question .icon {
      flex-shrink: 0;
      transition: transform .2s;
      color: var(--accent);
      font-size: 1.4rem;
      line-height: 1;
    }
    .qa-item.open .qa-question .icon { transform: rotate(45deg); }
    .qa-answer { max-height: 0; overflow: hidden; transition: max-height .25s ease; }
    .qa-answer-inner { padding: 0 20px 18px; color: var(--text-dim); border-top: 1px solid transparent; }
    .qa-item.open .qa-answer-inner { border-top-color: var(--border); padding-top: 16px; }
    .qa-answer-inner a { color: var(--accent); }
    .qa-answer-inner code { background: var(--bg-soft); padding: 2px 6px; border-radius: 6px; font-size: .9em; }
    .empty { text-align: center; color: var(--text-dim); padding: 40px 0; }
    footer { text-align: center; margin-top: 48px; color: var(--text-dim); font-size: .9rem; }
    footer a { color: var(--accent); text-decoration: none; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Netflix Q&amp;A</h1>
      <p>Click on the threads to see the answer!</p>
    </header>
    <div class="search">
      <input id="search" type="text" placeholder="🔍 Search Bar" autocomplete="off" />
    </div>
    <div id="qa-list" class="qa-list"></div>
    <div id="empty" class="empty" style="display:none;">I cant find anything! MSG ME ON ELDORADO</div>
    <footer>
      Site works on <a href="https://pages.github.com/" target="_blank" rel="noopener">GitHub Pages</a> ·
      Netflix <code>CDK key</code>
    </footer>
  </div>

  <script src="questions.js"></script>
  <script>
    (function () {
      var list = document.getElementById("qa-list");
      var empty = document.getElementById("empty");
      var search = document.getElementById("search");
      var data = (typeof QUESTIONS !== "undefined" && Array.isArray(QUESTIONS)) ? QUESTIONS : [];

      function render(filter) {
        list.innerHTML = "";
        filter = (filter || "").trim().toLowerCase();
        var shown = 0;
        data.forEach(function (item) {
          var q = (item.q || "");
          var a = (item.a || "");
          if (filter && (q + " " + a).toLowerCase().indexOf(filter) === -1) return;
          shown++;
          var wrap = document.createElement("div");
          wrap.className = "qa-item";
          var btn = document.createElement("button");
          btn.className = "qa-question";
          btn.innerHTML = "<span>" + escapeHtml(q) + "</span><span class='icon'>+</span>";
          var ans = document.createElement("div");
          ans.className = "qa-answer";
          var inner = document.createElement("div");
          inner.className = "qa-answer-inner";
          inner.innerHTML = a;
          ans.appendChild(inner);
          btn.addEventListener("click", function () {
            var isOpen = wrap.classList.toggle("open");
            ans.style.maxHeight = isOpen ? (inner.scrollHeight + 32) + "px" : "0";
          });
          wrap.appendChild(btn);
          wrap.appendChild(ans);
          list.appendChild(wrap);
        });
        empty.style.display = shown === 0 ? "block" : "none";
      }

      function escapeHtml(s) {
        return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
      }

      search.addEventListener("input", function () { render(search.value); });
      render("");
    })();
  </script>
</body>
</html>
